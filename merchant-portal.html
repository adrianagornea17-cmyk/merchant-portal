<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchant Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f0f0f;
      --sidebar-bg:   #161616;
      --card-bg:      #1e1e1e;
      --card-hover:   #252525;
      --border:       #282828;
      --text:         #ffffff;
      --text-2:       #d1d5db;
      --text-3:       #6b7280;
      --text-4:       #3f3f46;
      --accent:       #3b82f6;
      --active-bg:    rgba(59,130,246,0.14);
      --green:        #4ade80;
      --red:          #f87171;
      --amber:        #fbbf24;
      --sidebar-w:    268px;
      --radius:       10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      border-right: 1px solid var(--border);
      transition: width 0.22s ease, min-width 0.22s ease;
      overflow: hidden;
    }

    /* ── Collapsed state ── */
    #sidebar.collapsed { width: 54px; min-width: 54px; }

    #sidebar.collapsed .nav-label,
    #sidebar.collapsed .merchant-chip,
    #sidebar.collapsed .sec-label,
    #sidebar.collapsed .chev,
    #sidebar.collapsed .back-btn,
    #sidebar.collapsed .tool-info,
    #sidebar.collapsed .cur-dot,
    #sidebar.collapsed .user-name,
    #sidebar.collapsed .user-role,
    #sidebar.collapsed .sub-dot { display: none; }

    #sidebar.collapsed .sb-header { padding: 14px 10px; }
    #sidebar.collapsed .logo-row  { justify-content: center; }

    #sidebar.collapsed .tool-nav,
    #sidebar.collapsed .nav-btn   { justify-content: center; padding: 9px; }

    #sidebar.collapsed .sub-btn,
    #sidebar.collapsed .switch-btn { justify-content: center; padding: 8px; }

    #sidebar.collapsed .sb-footer      { justify-content: center; }
    #sidebar.collapsed .tool-header    { padding: 12px 10px; }
    #sidebar.collapsed .tool-title-row { justify-content: center; }
    #sidebar.collapsed .split-hr       { margin: 8px 6px; }
    #sidebar.collapsed .sb-toggle      { transform: rotate(180deg); }

    /* Toggle button */
    .sb-toggle {
      margin-left: auto;
      width: 26px; height: 26px;
      border-radius: 6px;
      background: none;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .sb-toggle:hover { background: #2a2a2a; color: #fff; }
    #sidebar.collapsed .sb-toggle { margin-left: 0; }

    .sb-header {
      padding: 18px 14px 14px;
      flex-shrink: 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 30px; height: 30px;
      background: #2563eb;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 14.5px;
      font-weight: 600;
      color: #fff;
    }

    .merchant-chip {
      background: #202020;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin: 10px 12px 0;
      flex-shrink: 0;
    }

    .merchant-name { color: #fff; font-size: 12.5px; font-weight: 600; }
    .merchant-mid  { color: var(--text-3); font-size: 11px; margin-top: 2px; }

    .sb-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
    }

    .sb-scroll::-webkit-scrollbar { width: 3px; }
    .sb-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .sec-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.9px;
      color: var(--text-4);
      text-transform: uppercase;
      padding: 14px 10px 5px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text-3);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
      text-decoration: none;
    }

    .nav-btn:hover  { background: #202020; color: var(--text-2); }
    .nav-btn.active { background: var(--active-bg); color: #93c5fd; }

    .nav-btn .icon { width: 16px; height: 16px; flex-shrink: 0; }

    .nav-btn .chev {
      margin-left: auto;
      width: 14px; height: 14px;
      flex-shrink: 0;
      opacity: 0.4;
    }

    /* Home-view: tool nav rows */
    .tool-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text-3);
      font-size: 13px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }
    .tool-nav:hover { background: #202020; color: var(--text-2); }

    .tool-nav-left { display: flex; align-items: center; gap: 9px; }

    /* Tool view: sub-menu */
    .sub-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text-3);
      font-size: 13px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }
    .sub-btn:hover  { background: #202020; color: var(--text-2); }
    .sub-btn.active { background: var(--active-bg); color: #93c5fd; }

    .sub-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #3f3f46;
      transition: background 0.1s;
    }
    .sub-btn.active .sub-dot { background: var(--accent); }

    /* Split divider line */
    .split-hr {
      margin: 10px 8px;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* Compact switch-tool rows */
    .switch-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-radius: 7px;
      color: #4b5563;
      font-size: 12px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }
    .switch-btn:hover   { background: #1e1e1e; color: var(--text-3); }
    .switch-btn.current { background: #202020; color: var(--text-2); }

    .switch-left { display: flex; align-items: center; gap: 7px; }

    .cur-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Tool view header */
    .tool-header {
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text-3);
      font-size: 11.5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0 0 10px 0;
      transition: color 0.1s;
    }
    .back-btn:hover { color: var(--text-2); }

    .tool-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tool-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .tool-name  { font-size: 13.5px; font-weight: 600; color: #fff; }
    .tool-sub   { font-size: 11px;   color: var(--text-3); margin-top: 2px; }

    /* Footer */
    .sb-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #4f46e5;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    .user-name { font-size: 12.5px; font-weight: 600; color: #fff; }
    .user-role { font-size: 11px; color: var(--text-3); margin-top: 1px; }

    /* ─── MAIN ─── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 13px 30px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-title { font-size: 14.5px; font-weight: 600; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14.5px;
      font-weight: 600;
    }
    .bc-parent  { color: var(--text-3); }
    .bc-sep     { color: var(--text-4); font-weight: 400; }

    .bell {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); cursor: pointer;
      transition: color 0.1s;
    }
    .bell:hover { color: #fff; }

    /* Page content */
    .page {
      flex: 1;
      overflow-y: auto;
      padding: 32px 30px;
    }
    .page::-webkit-scrollbar { width: 5px; }
    .page::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-lbl {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--text-3);
      text-transform: uppercase;
    }

    .stat-val {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin: 5px 0 3px;
      line-height: 1;
    }

    .stat-note { font-size: 11px; }

    /* Tools section */
    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-title { font-size: 13.5px; font-weight: 600; white-space: nowrap; }
    .section-line  { flex: 1; height: 1px; background: var(--border); }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .tool-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 22px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      text-align: center;
      position: relative;
    }

    .tool-card:hover {
      background: var(--card-hover);
      border-color: #333;
    }

    /* ─── Card more-menu ─── */
    .tc-more-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 26px; height: 26px;
      border-radius: 6px;
      background: transparent;
      border: none;
      color: var(--text-3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.1s, background 0.1s, color 0.1s;
    }

    .tool-card:hover .tc-more-btn { opacity: 1; }
    .tc-more-btn:hover { background: #2e2e2e; color: #fff; }
    .tc-more-btn.open  { opacity: 1; background: #2e2e2e; color: #fff; }

    .tc-menu {
      display: none;
      position: absolute;
      top: 36px; right: 8px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      min-width: 160px;
      z-index: 200;
      padding: 4px 0;
      text-align: left;
    }

    .tc-menu.open { display: block; animation: dropIn 0.12s ease; }

    .tc-menu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #d1d5db;
      cursor: pointer;
      transition: background 0.08s, color 0.08s;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
    }

    .tc-menu-item:hover { background: #2a2a2a; color: #fff; }

    .tc-menu-item.danger { color: #f87171; }
    .tc-menu-item.danger:hover { background: #2a1414; color: #fca5a5; }

    .tc-menu-sep { margin: 4px 0; border: none; border-top: 1px solid #2a2a2a; }

    .tc-icon {
      width: 46px; height: 46px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .tc-name { font-size: 13px; font-weight: 600; color: #fff; }
    .tc-sub  { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }

    .tc-cta {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid;
      opacity: 1;
      transition: background 0.12s;
      white-space: nowrap;
    }

    .tc-cta:hover { filter: brightness(1.15); }

    /* Tool content placeholder */
    .tool-content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tool-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      gap: 8px;
      padding: 40px;
    }

    .tp-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }

    .tp-title { font-size: 16px; font-weight: 600; color: var(--text-2); }
    .tp-sub   { font-size: 13px; color: var(--text-3); }

    /* Welcome heading */
    .welcome-title { font-size: 26px; font-weight: 700; color: #fff; }
    .welcome-date  { font-size: 13px; color: var(--text-3); margin-top: 3px; margin-bottom: 26px; }

    /* ─── PAY BY LINK PAGE ─── */
    .pbl-page {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }
    .pbl-page::-webkit-scrollbar { width: 5px; }
    .pbl-page::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

    .pbl-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .pbl-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .pbl-create-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 9px 22px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .pbl-create-btn:hover { background: #1d4ed8; }

    .pbl-card {
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 24px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Light-mode wizard preview (intentionally light — mirrors the real UI) */
    .pbl-mockup {
      background: #f0f0f2;
      border-radius: 14px;
      width: 100%;
      max-width: 520px;
      padding: 24px 24px 0;
      margin-bottom: 32px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .mock-back {
      font-size: 11.5px;
      color: #2563eb;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .mock-heading {
      font-size: 19px;
      font-weight: 700;
      color: #111;
      margin-bottom: 20px;
    }

    .mock-stepper {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 18px;
    }

    .mock-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-width: 80px;
    }

    .mock-step-circle {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }

    .mock-step-circle.on  { background: #2563eb; color: #fff; }
    .mock-step-circle.off { background: #d1d5db; color: #9ca3af; }

    .mock-step-label { font-size: 11px; color: #374151; font-weight: 500; white-space: nowrap; }

    .mock-step-line {
      flex: 1;
      height: 2px;
      background: #d1d5db;
      margin-top: 12px;
    }

    .mock-form-card {
      background: #fff;
      border-radius: 10px 10px 0 0;
      padding: 18px 18px 22px;
    }

    .mock-form-title { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 14px; }

    .mock-lbl { font-size: 11px; color: #6b7280; margin-bottom: 4px; }

    .mock-select {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #9ca3af;
      background: #fff;
      margin-bottom: 14px;
    }

    .mock-divider { border: none; border-top: 1px solid #f0f0f0; margin: 2px 0 14px; }

    .mock-radios { display: flex; gap: 16px; margin-bottom: 12px; }

    .mock-radio {
      display: flex; align-items: center; gap: 5px;
      font-size: 11.5px; color: #6b7280;
    }

    .mock-radio-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .mock-amount-row { display: flex; gap: 8px; }

    .mock-amount-box {
      flex: 1;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #9ca3af;
      background: #fff;
    }

    .pbl-cta-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
    }

    .pbl-cta-desc {
      font-size: 13px;
      color: var(--text-3);
      text-align: center;
      max-width: 520px;
      line-height: 1.75;
    }

    /* ─── END PAY BY LINK ─── */

    /* ─── TRANSACTIONS OVERVIEW ─── */
    .txn-page { flex:1; overflow-y:auto; padding:28px 30px; }
    .txn-page::-webkit-scrollbar { width:5px; }
    .txn-page::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:4px; }

    .txn-header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:22px;
    }
    .txn-title { font-size:20px; font-weight:700; color:#fff; }
    .txn-search-btn {
      display:flex; align-items:center; gap:7px;
      background:#2563eb; color:#fff; border:none; border-radius:20px;
      padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer;
      transition:background 0.12s;
    }
    .txn-search-btn:hover { background:#1d4ed8; }

    .txn-table-card {
      background:#1a1a1a; border:1px solid var(--border); border-radius:14px; overflow:hidden;
    }

    .txn-table-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px 12px; border-bottom:1px solid var(--border);
    }
    .txn-table-title { font-size:13.5px; font-weight:600; color:#fff; }
    .txn-view-all {
      font-size:12px; font-weight:600; color:#60a5fa;
      background:none; border:none; cursor:pointer; transition:color 0.1s;
    }
    .txn-view-all:hover { color:#93c5fd; }

    table.txn { width:100%; border-collapse:collapse; }
    table.txn th {
      text-align:left; padding:10px 18px; font-size:10px; font-weight:700;
      letter-spacing:0.8px; color:var(--text-3); text-transform:uppercase;
      border-bottom:1px solid var(--border);
    }
    table.txn th:last-child, table.txn td:last-child { text-align:center; }
    table.txn th:nth-child(4), table.txn td:nth-child(4) { text-align:right; }

    table.txn td {
      padding:13px 18px; font-size:13px; border-bottom:1px solid #222;
    }
    table.txn tr:last-child td { border-bottom:none; }
    table.txn tr:hover td { background:#202020; }

    .txn-id    { color:#60a5fa; font-family:monospace; font-size:12.5px; }
    .txn-time  { color:var(--text-3); font-size:12px; }
    .txn-type  { color:var(--text-2); }
    .txn-amt   { color:#fff; font-weight:600; }

    .badge {
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:11px; font-weight:600;
    }
    .badge-ok  { background:rgba(74,222,128,0.12); color:#4ade80; }
    .badge-pen { background:rgba(251,191,36,0.12);  color:#fbbf24; }
    .badge-dec { background:rgba(248,113,113,0.12); color:#f87171; }
    /* ─── END TRANSACTIONS ─── */

  `;
}

/* ── Main: TOOL ───────────────────────────────────────────────────────── */
function renderToolMain() {
  const t = tool();

  if (t.id === 'payment'      && state.subItem === 'Overview') return renderPayByLink();
  if (t.id === 'transactions' && state.subItem === 'Overview') return renderTransactionsOverview();

  return `
    <div class="topbar">
      <span class="breadcrumb">
        <span class="bc-parent">${t.name}</span>
        <span class="bc-sep">/</span>
        <span>${state.subItem}</span>
      </span>
      <div class="topbar-right">
        ${launcherHTML()}
        <button class="bell">${icon('bell','currentColor',15)}</button>
      </div>
    </div>
    <div class="tool-content-wrap">
      <div class="tool-placeholder">
        ${toolIconBadge(t, 58)}
        <div class="tp-title">${t.name} — ${state.subItem}</div>
        <div class="tp-sub">${t.subtitle}</div>
      </div>
    </div>
  `;
}

/* ── Render engine ────────────────────────────────────────────────────── */
function render() {
  document.getElementById('sidebar').innerHTML =
    state.view === 'home' ? renderHomeSidebar() : renderToolSidebar();
  document.getElementById('main').innerHTML =
    state.view === 'home' ? renderHomeMain() : renderToolMain();
}

/* ── Actions ─────────────────────────────────────────────────────────── */
function selectTool(id) {
  state = { view: 'tool', toolId: id, subItem: 'Overview' };
  render();
}

function selectSub(item) {
  state.subItem = item;
  render();
}

function goHome() {
  state = { view: 'home', toolId: null, subItem: 'Overview' };
  render();
}

render();

/* ── Launcher toggle ─────────────────────────────────────────────────── */
function toggleLauncher(e) {
  e.stopPropagation();
  const panel = document.getElementById('launcherPanel');
  const btn   = document.getElementById('launcherBtn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function closeLauncher() {
  const panel = document.getElementById('launcherPanel');
  const btn   = document.getElementById('launcherBtn');
  if (panel) { panel.classList.remove('open'); btn.classList.remove('open'); }
}

document.addEventListener('click', () => { closeLauncher(); closeAllMenus(); });

/* ── Sidebar toggle ──────────────────────────────────────────────────── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function toggleCardMenu(e, id) {
  e.stopPropagation();
  const menu = document.getElementById('menu-' + id);
  const btn  = document.getElementById('moreBtn-' + id);
  const isOpen = menu.classList.contains('open');
  closeAllMenus();
  if (!isOpen) {
    menu.classList.add('open');
    btn.classList.add('open');
  }
}

function closeAllMenus() {
  document.querySelectorAll('.tc-menu').forEach(m => m.classList.remove('open'));
  document.querySelectorAll('.tc-more-btn').forEach(b => b.classList.remove('open'));
}
</script>
