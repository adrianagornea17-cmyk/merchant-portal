<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifone Central — Merchant Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-w: 208px;
      --nav-collapsed-w: 64px;
      --nav-bg: #ffffff;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --text: #111827;
      --text-2: #374151;
      --text-3: #6b7280;
      --text-4: #9ca3af;
      --active-bg: #2563eb;
      --active-text: #ffffff;
      --hover-bg: #f3f4f6;
      --accent: #2563eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── NAV RAIL ─── */
/* ─── NAV RAIL ─── */
    #nav-rail {
      width: var(--nav-w);
      min-width: var(--nav-w);
      background: var(--nav-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: width 0.22s ease, min-width 0.22s ease;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }
    #nav-rail.collapsed {
      width: var(--nav-collapsed-w);
      min-width: var(--nav-collapsed-w);
    }

    /* Logo */
    .nav-logo {
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .nav-logo-icon { flex-shrink: 0; }
    .nav-logo-text {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.3px;
      transition: opacity 0.15s, transform 0.15s;
    }
    #nav-rail.collapsed .nav-logo-text {
      opacity: 0;
      pointer-events: none;
    }

    /* Collapse button */
    .nav-collapse-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-radius: 7px;
      color: var(--text-3);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      margin: 8px 8px 2px;
      text-align: left;
      transition: background 0.1s, color 0.1s;
      overflow: hidden;
      white-space: nowrap;
      width: calc(100% - 16px);
    }
    .nav-collapse-btn:hover { background: var(--hover-bg); color: var(--text); }
    .nav-collapse-btn .nc-icon { flex-shrink: 0; transition: transform 0.22s; }
    #nav-rail.collapsed .nav-collapse-btn .nc-icon { transform: scaleX(-1); }
    .nav-collapse-btn .nc-label { transition: opacity 0.15s; }
    #nav-rail.collapsed .nav-collapse-btn .nc-label { opacity: 0; pointer-events: none; }

    /* Scroll area */
    .nav-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px 8px;
    }
    .nav-scroll::-webkit-scrollbar { width: 3px; }
    .nav-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* Nav item */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 7px;
      color: var(--text-2);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
      text-decoration: none;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }
    .nav-item:hover { background: var(--hover-bg); color: var(--text); }
    .nav-item.active {
      background: var(--active-bg);
      color: var(--active-text);
      font-weight: 600;
    }
    .nav-item .ni-icon {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-item .ni-label { flex: 1; transition: opacity 0.15s; }
    #nav-rail.collapsed .nav-item .ni-label { opacity: 0; }
    .nav-item .ni-arrow {
      flex-shrink: 0;
      transition: transform 0.22s, opacity 0.15s;
      display: flex; align-items: center;
    }
    .nav-item.open .ni-arrow { transform: rotate(90deg); }
    #nav-rail.collapsed .nav-item .ni-arrow { opacity: 0; }

    /* Tooltip when collapsed */
    #nav-rail.collapsed .nav-item::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(var(--nav-collapsed-w) + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: #1e293b;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }
    #nav-rail.collapsed .nav-item:hover::after { opacity: 1; }

    /* Sub-items container */
    .nav-sub {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }
    .nav-sub.open { max-height: 600px; }
    #nav-rail.collapsed .nav-sub { display: none; }

    .nav-sub-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px 6px 34px;
      border-radius: 7px;
      color: var(--text-3);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
    }
    .nav-sub-item:hover { background: var(--hover-bg); color: var(--text-2); }
    .nav-sub-item.active { color: var(--accent); font-weight: 500; }
    .nav-sub-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
    }
    .nav-sub-item.active .nav-sub-dot { background: var(--accent); }

    /* Divider */
    .nav-divider {
      margin: 6px 8px;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* Nav bottom */
    .nav-bottom {
      padding: 8px 8px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-copyright {
      font-size: 10px;
      color: var(--text-4);
      padding: 4px 12px 0;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    #nav-rail.collapsed .nav-copyright { opacity: 0; }

/* ─── PORTAL HOME LINK ─── */
    .portal-home-link {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-4);
      text-decoration: none;
      border: none;
      background: none;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
      overflow: hidden;
    }
    .portal-home-link:hover { background: var(--hover-bg); color: var(--text-3); }
    .portal-home-link .phi { flex-shrink: 0; }
    .portal-home-link .phl { transition: opacity 0.15s; }
    #nav-rail.collapsed .portal-home-link .phl { opacity: 0; }

    /* ─── MAIN ─── */
/* ─── MAIN ─── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Topbar */
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13.5px;
    }
    .topbar-bc-root { color: var(--text-3); }
    .topbar-bc-sep  { color: var(--text-4); }
    .topbar-bc-cur  { color: var(--text); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-icon-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .topbar-icon-btn:hover { background: var(--hover-bg); color: var(--text); }
    .topbar-search {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      height: 34px;
      width: 200px;
      transition: border-color 0.15s, width 0.2s;
    }
    .topbar-search:focus-within { border-color: var(--accent); width: 240px; }
    .topbar-search input {
      border: none;
      background: none;
      font-size: 13px;
      color: var(--text);
      outline: none;
      width: 100%;
    }
    .topbar-search input::placeholder { color: var(--text-4); }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1d4ed8;
      color: #fff;
      font-size: 11.5px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Page scroll wrapper */
    .page-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .page-scroll::-webkit-scrollbar { width: 4px; }
    .page-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* Page header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 56px 20px;
      flex-shrink: 0;
    }
    .page-header-leading {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.4px;
      white-space: nowrap;
    }

    /* Favorite button */
    .fav-wrap { position: relative; }
    .fav-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-4);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .fav-btn:hover { border-color: #fbbf24; color: #f59e0b; }
    .fav-btn.starred { border-color: #f59e0b; color: #f59e0b; background: #fffbeb; }

    /* Favorites popover */
    .fav-popover {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      width: 296px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      z-index: 200;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .fav-popover.open { display: flex; }
    .fav-pop-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .fav-pop-title { font-size: 13px; font-weight: 600; color: #0f172a; }
    .fav-pop-close {
      width: 24px; height: 24px;
      border-radius: 5px;
      border: none; background: none;
      cursor: pointer; color: var(--text-4);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: background 0.1s, color 0.1s;
    }
    .fav-pop-close:hover { background: var(--hover-bg); color: var(--text-2); }
    .fav-pop-list { padding: 8px; display: flex; flex-direction: column; gap: 2px; }
    .fav-pop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      text-decoration: none;
      color: var(--text-2);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .fav-pop-item:hover { background: var(--hover-bg); }
    .fav-pop-icon {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .fav-pop-name { font-size: 13px; font-weight: 500; }
    .fav-pop-section { font-size: 11px; color: var(--text-4); margin-top: 1px; }
    .fav-pop-item .fav-remove {
      margin-left: auto;
      width: 20px; height: 20px;
      border-radius: 4px;
      border: none; background: none;
      cursor: pointer; color: var(--text-4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.1s, background 0.1s;
      flex-shrink: 0;
    }
    .fav-pop-item:hover .fav-remove { opacity: 1; }
    .fav-remove:hover { background: #fee2e2 !important; color: #ef4444 !important; }
    .fav-pop-empty {
      padding: 24px 16px;
      text-align: center;
    }
    .fav-pop-empty-icon { font-size: 28px; margin-bottom: 8px; }
    .fav-pop-empty-text { font-size: 13px; color: var(--text-3); line-height: 1.5; }
    .fav-pop-footer {
      padding: 10px 16px 12px;
      border-top: 1px solid var(--border);
      font-size: 11.5px;
      color: var(--text-4);
      text-align: center;
    }

    /* Page header trailing */
    .page-header-trailing {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      height: 36px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
      text-decoration: none;
      font-family: inherit;
    }
    .btn-ghost {
      background: none;
      border-color: var(--border);
      color: var(--text-2);
    }
    .btn-ghost:hover { border-color: #9ca3af; background: var(--hover-bg); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 12px;
      height: 28px;
      border-radius: 20px;
      background: var(--hover-bg);
      border: 1.5px solid var(--border);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.1s;
      font-family: inherit;
    }
    .tag-chip:hover { background: #e5e7eb; }

    /* Page content */
    .page-content {
      flex: 1;
      padding: 0 56px 40px;
    }

    /* Filter/action bar */
    .table-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .table-actions-left { display: flex; align-items: center; gap: 8px; }
    .table-actions-right {
      font-size: 12px;
      color: var(--text-4);
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text-2);
      transition: border-color 0.1s, background 0.1s;
      white-space: nowrap;
      font-family: inherit;
    }
    .filter-chip:hover { border-color: #9ca3af; background: var(--hover-bg); }
    .filter-chip.active { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
    .search-input {
      display: flex;
      align-items: center;
      gap: 7px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      height: 32px;
      background: #fff;
      transition: border-color 0.15s;
    }
    .search-input:focus-within { border-color: var(--accent); }
    .search-input input {
      border: none; background: none;
      font-size: 13px; color: var(--text);
      outline: none; width: 180px;
      font-family: inherit;
    }
    .search-input input::placeholder { color: var(--text-4); }

    /* Data table */
    .data-table-wrap {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: #f8fafc;
      border-bottom: 1.5px solid var(--border);
    }
    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--text-2); }
    th .sort-icon { display: inline-block; margin-left: 4px; opacity: 0.4; }
    th.sorted .sort-icon { opacity: 1; color: var(--accent); }
    td {
      padding: 13px 16px;
      font-size: 13.5px;
      color: var(--text-2);
      border-bottom: 1px solid #f1f5f9;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.1s; cursor: pointer; }
    tbody tr:hover { background: #f8fafc; }
    .cell-mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12.5px; color: var(--accent); }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-completed { background: #f0fdf4; color: #16a34a; }
    .status-completed .status-dot { background: #16a34a; }
    .status-pending   { background: #fffbeb; color: #d97706; }
    .status-pending .status-dot { background: #f59e0b; }
    .status-failed    { background: #fef2f2; color: #dc2626; }
    .status-failed .status-dot { background: #ef4444; }
    .status-refunded  { background: #f0f9ff; color: #0284c7; }
    .status-refunded .status-dot { background: #0ea5e9; }
    .amount-positive { color: #111827; font-weight: 600; }
    .amount-negative { color: #dc2626; font-weight: 600; }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-top: 1.5px solid var(--border);
      background: #f8fafc;
    }
    .pg-info { font-size: 12.5px; color: var(--text-3); }
    .pg-controls { display: flex; align-items: center; gap: 4px; }
    .pg-btn {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-2);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.1s, background 0.1s;
      font-family: inherit;
    }
    .pg-btn:hover { border-color: #9ca3af; background: var(--hover-bg); }
    .pg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Checkbox */
    .cb {
      width: 16px; height: 16px;
      border-radius: 4px;
      border: 1.5px solid #d1d5db;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s;
    }
    .cb.checked { background: var(--accent); border-color: var(--accent); }
    .cb svg { display: none; }
    .cb.checked svg { display: block; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    

    

    /* ─── SIDEBAR ─── */
    

    /* ── Collapsed state ── */
    

    

    
    

    

    

    
    
    
    
    

    /* Toggle button */
    .sb-toggle {
      margin-left: auto;
      width: 26px; height: 26px;
      border-radius: 6px;
      background: none;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .sb-toggle:hover { background: #2a2a2a; color: #fff; }
    

    .sb-header {
      padding: 18px 14px 14px;
      flex-shrink: 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .merchant-chip {
      background: #202020;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin: 10px 12px 0;
      flex-shrink: 0;
    }

    .merchant-name { color: #fff; font-size: 12.5px; font-weight: 600; }

    #main {

      font-weight: 700;
      letter-spacing: 0.8px;

    .stat-val {
      font-size: 26px;
      font-weight: 700;
      color: #fff;

    /* Tools section */
    .section-head {

      gap: 12px;

      width: 46px; height: 46px;

    }

    .tc-name { font-size: 13px; font-weight: 600; color: #fff; }
    .tc-sub  { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }

    .tc-cta {

      align-items: center;

      font-size: 11.5px;
      font-weight: 600;

    .tool-content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;

    .tool-placeholder {

      border-radius: 14px;

      margin-bottom: 4px;
    }

    .tp-title { font-size: 16px; font-weight: 600; color: var(--text-2); }
    .tp-sub   { font-size: 13px; color: var(--text-3); }

    /* Welcome heading */
    .welcome-title { font-size: 26px; font-weight: 700; color: #fff; }
    .welcome-date  { font-size: 13px; color: var(--text-3); margin-top: 3px; margin-bottom: 26px; }

    /* ─── PAY BY LINK PAGE ─── */
    .pbl-page {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
    }
    .pbl-page::-webkit-scrollbar { width: 5px; }
    .pbl-page::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

      justify-content: space-between;
      margin-bottom: 22px;
    }

      font-size: 20px;
      font-weight: 700;

      border-radius: 20px;
      padding: 9px 22px;

      cursor: pointer;
      transition: background 0.12s;

      font-size: 19px;

    .pbl-cta-title {

      color: #fff;

      color: var(--text-3);

    .txn-page { flex:1; overflow-y:auto; padding:28px 30px; }

      background:none; border:none; cursor:pointer; transition:color 0.1s;

    table.txn { width:100%; border-collapse:collapse; }

      text-align:left; padding:10px 18px; font-size:10px; font-weight:700;

      border-bottom:1px solid var(--border);

    table.txn th:nth-child(4), table.txn td:nth-child(4) { text-align:right; }

      padding:13px 18px; font-size:13px; border-bottom:1px solid #222;

    .txn-id    { color:#60a5fa; font-family:monospace; font-size:12.5px; }

    .txn-type  { color:var(--text-2); }

      display:inline-block; padding:3px 10px; border-radius:20px;

    .badge-pen { background:rgba(251,191,36,0.12);  color:#fbbf24; }

    /* ─── END TRANSACTIONS ─── */

    /* Transitions */
    
    @keyframes fadeIn { from { opacity: 0.5; } to { opacity: 1; } }

    /* ─── APP LAUNCHER ─── */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;

      position: relative;
    }

    .launcher-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: transparent;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-3);
      transition: background 0.12s, color 0.12s;
    }
    .launcher-btn:hover { background: #2a2a2a; color: #fff; }
    .launcher-btn.open  { background: #333; color: #fff; }

    .launcher-panel {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 300px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);

      z-index: 999;
      display: none;

    .lp-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .lp-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;

    .lp-edit {
      width: 34px; height: 34px;

      background: #2e2e2e;
      border: none;

      color: var(--text-3);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;

    .lp-edit:hover { background: #3a3a3a; color: #fff; }

    .lp-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .lp-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 12px 6px;
      border-radius: 10px;
      cursor: pointer;
      background: none;
      border: none;
      transition: background 0.1s;
    }
    .lp-item:hover { background: #2a2a2a; }

    .lp-icon {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }

    .lp-name {

/* ── Launcher toggle ─────────────────────────────────────────────────── */
function toggleLauncher(e) {
  e.stopPropagation();
  const panel = document.getElementById('launcherPanel');
  const btn   = document.getElementById('launcherBtn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function closeLauncher() {
  const panel = document.getElementById('launcherPanel');
  const btn   = document.getElementById('launcherBtn');
  if (panel) { panel.classList.remove('open'); btn.classList.remove('open'); }
}

document.addEventListener('click', () => { closeLauncher(); closeAllMenus(); });

/* ── Sidebar toggle ──────────────────────────────────────────────────── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function toggleCardMenu(e, id) {
  e.stopPropagation();
  const menu = document.getElementById('menu-' + id);
  const btn  = document.getElementById('moreBtn-' + id);
  const isOpen = menu.classList.contains('open');
  closeAllMenus();
  if (!isOpen) {
    menu.classList.add('open');
    btn.classList.add('open');
  }
}

function closeAllMenus() {
  document.querySelectorAll('.tc-menu').forEach(m => m.classList.remove('open'));
  document.querySelectorAll('.tc-more-btn').forEach(b => b.classList.remove('open'));
}

/* ── Helpers ─────────────────────────────────────────────────────────── */
function icon(key, color, size) {
  const svg = (I[key] || '').replace(/width="\d+"/, `width="${size||17}"`).replace(/height="\d+"/, `height="${size||17}"`);
  return `<span style="color:${color||'currentColor'};display:flex;align-items:center;">${svg}</span>`;
}

function toolIconBadge(t, size) {

}

          </div>
          <div class="stat-card">
            <div class="stat-lbl">Avg Ticket</div>
            <div class="stat-val">$41.60</div>
            <div class="stat-note" style="color:#f87171">↓ 1.3% vs yesterday</div>
          </div>
        </div>

        <div class="txn-table-card">
          <div class="txn-table-head">
            <span class="txn-table-title">Last 5 transactions</span>
            <button class="txn-view-all" onclick="selectSub('Search')">View all →</button>
          </div>
          <table class="txn">
            <thead>
              <tr>
                <th>Transaction ID</th>
                <th>Time</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

/* ── Main: TOOL ───────────────────────────────────────────────────────── */
function renderToolMain() {
  const t = tool();

  if (t.id === 'payment'      && state.subItem === 'Overview') return renderPayByLink();
  if (t.id === 'transactions' && state.subItem === 'Overview') return renderTransactionsOverview();

  return `
    <div class="topbar">
      <span class="breadcrumb">
        <span class="bc-parent">${t.name}</span>
        <span class="bc-sep">/</span>
        <span>${state.subItem}</span>
      </span>
      <div class="topbar-right">
        ${launcherHTML()}
        <button class="bell">${icon('bell','currentColor',15)}</button>
      </div>
    </div>
    <div class="tool-content-wrap">
      <div class="tool-placeholder">
        ${toolIconBadge(t, 58)}
        <div class="tp-title">${t.name} — ${state.subItem}</div>
        <div class="tp-sub">${t.subtitle}</div>
      </div>
    </div>
  `;
}

/* ── Render engine ────────────────────────────────────────────────────── */
function render() {
  document.getElementById('sidebar').innerHTML =
    state.view === 'home' ? renderHomeSidebar() : renderToolSidebar();
  document.getElementById('main').innerHTML =
    state.view === 'home' ? renderHomeMain() : renderToolMain();
}

/* ── Actions ─────────────────────────────────────────────────────────── */
function selectTool(id) {
  state = { view: 'tool', toolId: id, subItem: 'Overview' };
  render();
}

function selectSub(item) {
  state.subItem = item;
  render();
}

function goHome() {
  state = { view: 'home', toolId: null, subItem: 'Overview' };
  render();
}

render();

/* ── Launcher toggle ─────────────────────────────────────────────────── */
function toggleLauncher(e) {
  e.stopPropagation();
  const panel = document.getElementById('launcherPanel');
  const btn   = document.getElementById('launcherBtn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function closeLauncher() {
  const panel = document.getElementById('launcherPanel');
  const btn   = document.getElementById('launcherBtn');
  if (panel) { panel.classList.remove('open'); btn.classList.remove('open'); }
}

document.addEventListener('click', () => { closeLauncher(); closeAllMenus(); });

/* ── Sidebar toggle ──────────────────────────────────────────────────── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function toggleCardMenu(e, id) {
  e.stopPropagation();
  const menu = document.getElementById('menu-' + id);
  const btn  = document.getElementById('moreBtn-' + id);
  const isOpen = menu.classList.contains('open');
  closeAllMenus();
  if (!isOpen) {
    menu.classList.add('open');
    btn.classList.add('open');
  }
}

function closeAllMenus() {
  document.querySelectorAll('.tc-menu').forEach(m => m.classList.remove('open'));
  document.querySelectorAll('.tc-more-btn').forEach(b => b.classList.remove('open'));
}

</script>

</body>
</html>
